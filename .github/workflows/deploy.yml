name: Deploy via FTP

on:
  push:
    branches:
      - main # Jalankan otomatis saat ada push ke branch main

jobs:
  web-deploy:
    name: Sync Files to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 📂 Upload Files via FTP
        uses: SamKirland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: laravel_core/  # Folder tujuan di cPanel Anda
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            .env.*
